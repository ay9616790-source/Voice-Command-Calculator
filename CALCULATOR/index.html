<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="calculator">

            <div class="display">
                <input type="text" id="display" placeholder="0" readonly>
                <div id="voice-status" class="voice-status">
                    Say "Hey Calculator" to start...
                </div>
            </div>



            <div class="buttons">

                <button type="button" class="btn btn-clear" onclick="clearDisplay()">C</button>
                <button type="button" class="btn btn-operator" onclick="appendOperator('/')">÷</button>
                <button type="button" class="btn btn-operator" onclick="appendOperator('*')">×</button>
                <button type="button" class="btn btn-operator" onclick="deleteLast()">←</button>

                <button type="button" class="btn" onclick="appendNumber('7')">7</button>
                <button type="button" class="btn" onclick="appendNumber('8')">8</button>
                <button type="button" class="btn" onclick="appendNumber('9')">9</button>
                <button type="button" class="btn btn-operator" onclick="appendOperator('-')">−</button>

                <button type="button" class="btn" onclick="appendNumber('4')">4</button>
                <button type="button" class="btn" onclick="appendNumber('5')">5</button>
                <button type="button" class="btn" onclick="appendNumber('6')">6</button>
                <button type="button" class="btn btn-operator" onclick="appendOperator('+')">+</button>

                <button type="button" class="btn" onclick="appendNumber('1')">1</button>
                <button type="button" class="btn" onclick="appendNumber('2')">2</button>
                <button type="button" class="btn" onclick="appendNumber('3')">3</button>
                <button type="button" class="btn btn-special" onclick="findSquare()">x²</button>

                <button type="button" class="btn" onclick="appendNumber('0')">0</button>
                <button type="button" class="btn btn-operator" onclick="appendOperator('.')">.</button>
                <button type="button" class="btn btn-equals" onclick="calculate()">=</button>
                <button type="button" class="btn btn-special" onclick="findSquareRoot()">√</button>

                <button type="button" class="btn btn-special full-width" onclick="decimalToFraction()">D → F</button>
                <button type="button" class="btn btn-special full-width" onclick="fractionToDecimal()">F → D</button>

            </div>

        </div>
    </div>

    <script src="calculator.js"></script>

</body>
</html>
